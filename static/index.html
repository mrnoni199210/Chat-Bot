<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Priya 💕</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet"/>
<style>
  :root {
    --pink:       #ff6b9d;
    --pink-light: #ffb3cc;
    --pink-dark:  #e0457a;
    --purple:     #c084fc;
    --bg:         #0f0a1a;
    --bg2:        #1a1128;
    --bg3:        #221535;
    --bubble-her: #2a1a3e;
    --bubble-me:  #6b21a8;
    --text:       #f0e6ff;
    --text-muted: #a78bbc;
    --radius:     18px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--bg2);
    border-bottom: 1px solid rgba(255,107,157,0.15);
    flex-shrink: 0;
    position: relative;
  }

  .avatar-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .avatar {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 0 2px var(--bg2), 0 0 0 4px var(--pink);
  }

  .online-dot {
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 11px;
    height: 11px;
    background: #4ade80;
    border-radius: 50%;
    border: 2px solid var(--bg2);
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%,100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
    50%      { box-shadow: 0 0 0 4px rgba(74,222,128,0); }
  }

  .header-info { flex: 1; }

  .header-name {
    font-family: 'Pacifico', cursive;
    font-size: 18px;
    color: var(--pink-light);
    line-height: 1.2;
  }

  .header-status {
    font-size: 11px;
    color: #4ade80;
    margin-top: 1px;
  }

  .header-hearts {
    font-size: 18px;
    animation: float-hearts 3s ease-in-out infinite;
  }

  @keyframes float-hearts {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }

  /* ── MESSAGES AREA ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: rgba(255,107,157,0.3); border-radius: 2px; }

  /* ── BUBBLES ── */
  .bubble-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: bubble-in 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes bubble-in {
    from { opacity:0; transform: scale(0.85) translateY(8px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  .bubble-row.me { flex-direction: row-reverse; }

  .bubble-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .bubble {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: var(--radius);
    line-height: 1.5;
    font-size: 14.5px;
    position: relative;
    word-break: break-word;
  }

  .bubble-row.her .bubble {
    background: var(--bubble-her);
    border-bottom-left-radius: 4px;
    color: var(--text);
    border: 1px solid rgba(255,107,157,0.12);
  }

  .bubble-row.me .bubble {
    background: var(--bubble-me);
    border-bottom-right-radius: 4px;
    color: #fff;
  }

  .bubble-time {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    opacity: 0.7;
  }

  .bubble-row.me .bubble-time { text-align: right; }

  /* ── TYPING INDICATOR ── */
  .typing-row { display: none; }
  .typing-row.visible { display: flex; }

  .typing-bubble {
    background: var(--bubble-her);
    border: 1px solid rgba(255,107,157,0.12);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--pink);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%,60%,100% { transform: translateY(0); opacity:0.4; }
    30%          { transform: translateY(-6px); opacity:1; }
  }

  /* ── WELCOME CARD ── */
  .welcome-card {
    text-align: center;
    padding: 20px 16px;
    margin: 8px 0;
  }

  .welcome-emoji { font-size: 42px; margin-bottom: 8px; }

  .welcome-title {
    font-family: 'Pacifico', cursive;
    font-size: 22px;
    color: var(--pink-light);
    margin-bottom: 6px;
  }

  .welcome-sub {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 10px 12px;
    background: var(--bg2);
    border-top: 1px solid rgba(255,107,157,0.12);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--bg3);
    border-radius: 24px;
    border: 1.5px solid rgba(255,107,157,0.2);
    display: flex;
    align-items: flex-end;
    padding: 8px 14px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(255,107,157,0.1);
  }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
  }

  #msg-input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 12px rgba(255,107,157,0.35);
  }

  .send-btn:active { transform: scale(0.92); box-shadow: none; }

  .send-btn svg { width: 20px; height: 20px; fill: white; }

  /* ── BG DECORATION ── */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: -1;
    filter: blur(60px);
  }

  .orb1 {
    width: 200px; height: 200px;
    background: rgba(192,132,252,0.08);
    top: -60px; right: -60px;
  }

  .orb2 {
    width: 150px; height: 150px;
    background: rgba(255,107,157,0.07);
    bottom: 80px; left: -40px;
  }

  /* ── ERROR TOAST ── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #ef4444;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<!-- HEADER -->
<div class="header">
  <div class="avatar-wrap">
    <div class="avatar">🌸</div>
    <div class="online-dot"></div>
  </div>
  <div class="header-info">
    <!-- ══ NAAM YAHAN BADLO ══ -->
    <div class="header-name">Priya</div>
    <div class="header-status" id="status-text">Online • Tumhara intezaar kar rahi thi 💫</div>
  </div>
  <div class="header-hearts">💕</div>
</div>

<!-- MESSAGES -->
<div class="messages" id="messages">
  <!-- Welcome card -->
  <div class="welcome-card">
    <div class="welcome-emoji">🌸</div>
    <!-- ══ WELCOME MESSAGE YAHAN BADLO ══ -->
    <div class="welcome-title">Priya</div>
    <div class="welcome-sub">Aagaye aakhir tum... 🥺<br/>Bolo kya chal raha hai aaj?</div>
  </div>

  <!-- Typing indicator -->
  <div class="bubble-row her typing-row" id="typing-row">
    <div class="bubble-avatar">🌸</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="msg-input" placeholder="Kuch bolo... 💬" rows="1"></textarea>
  </div>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Telegram WebApp init ──
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#1a1128');
  tg.setBackgroundColor('#0f0a1a');
}

// ── DOM refs ──
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('msg-input');
const typingRow  = document.getElementById('typing-row');
const statusEl   = document.getElementById('status-text');
const toastEl    = document.getElementById('toast');

// ═══════════════════════════════════════════════════════
// ██  BACKEND URL — RENDER URL YAHAN DAALO  ██
// ═══════════════════════════════════════════════════════
const BACKEND_URL = "https://TUMHARA-APP-NAAM.onrender.com";
// ═══════════════════════════════════════════════════════

// User ID Telegram se lo (ya fallback)
const userId = tg?.initDataUnsafe?.user?.id || "webapp_user";
const userName = tg?.initDataUnsafe?.user?.first_name || "tum";

let isWaiting = false;

// ── Auto-resize textarea ──
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

// ── Enter to send (Shift+Enter = newline) ──
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── Scroll to bottom ──
function scrollBottom() {
  setTimeout(() => {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
  }, 50);
}

// ── Get time string ──
function getTime() {
  return new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });
}

// ── Add bubble to chat ──
function addBubble(text, sender) {
  // Remove typing indicator from flow (re-add at end)
  typingRow.remove();

  const row = document.createElement('div');
  row.className = `bubble-row ${sender}`;

  if (sender === 'her') {
    row.innerHTML = `
      <div class="bubble-avatar">🌸</div>
      <div>
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="bubble-time">${getTime()}</div>
      </div>`;
  } else {
    row.innerHTML = `
      <div>
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="bubble-time">${getTime()}</div>
      </div>`;
  }

  messagesEl.appendChild(row);
  messagesEl.appendChild(typingRow);
  scrollBottom();
}

// ── Show/hide typing ──
function showTyping(show) {
  typingRow.classList.toggle('visible', show);
  if (show) scrollBottom();
}

// ── Status text ──
function setStatus(text) {
  statusEl.textContent = text;
}

// ── Toast error ──
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 3000);
}

// ── Escape HTML ──
function escapeHtml(text) {
  return text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br/>');
}

// ── MAIN SEND FUNCTION ──
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isWaiting) return;

  // Clear input
  inputEl.value = '';
  inputEl.style.height = 'auto';

  // Add my bubble
  addBubble(text, 'me');

  // Show typing
  isWaiting = true;
  showTyping(true);
  setStatus('Soch rahi hai... 💭');

  try {
    const res = await fetch(`${BACKEND_URL}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, message: text })
    });

    if (!res.ok) throw new Error(`Server error: ${res.status}`);

    const data = await res.json();
    const reply = data.reply || "Kuch toh gadbad ho gayi... 🥺";

    showTyping(false);
    addBubble(reply, 'her');
    setStatus('Online • Abhi active hai 💫');

  } catch (err) {
    console.error(err);
    showTyping(false);
    showToast("Connection issue... thodi der baad try karo 🥺");
    setStatus('Online • Tumhara intezaar 💫');
  }

  isWaiting = false;
  inputEl.focus();
}

// ── Focus input on load ──
setTimeout(() => inputEl.focus(), 500);
</script>
</body>
</html>
