<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Mishty</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Lora:ital,wght@0,500;1,400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:         #0d0d0f;
    --bg2:        #141416;
    --bg3:        #1c1c1f;
    --line:       rgba(255,255,255,0.06);
    --accent:     #e8648a;
    --accent2:    #b06fd8;
    --bubble-her: #1e1e22;
    --bubble-me:  #3a1a4a;
    --text:       #ece8f0;
    --text-dim:   #7a7280;
    --radius:     16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 14px 18px 13px;
    background: var(--bg2);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
  }

  .online-dot {
    position: absolute;
    bottom: 0px;
    right: 0px;
    width: 9px;
    height: 9px;
    background: #5ec97e;
    border-radius: 50%;
    border: 2px solid var(--bg2);
  }

  .header-info { flex: 1; }

  .header-name {
    font-family: 'Lora', serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.01em;
    line-height: 1.2;
  }

  .header-status {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 1px;
    letter-spacing: 0.02em;
  }

  /* MESSAGES */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overscroll-behavior: contain;
  }

  .messages::-webkit-scrollbar { width: 2px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  /* BUBBLES */
  .bubble-row {
    display: flex;
    align-items: flex-end;
    gap: 7px;
    animation: pop-in 0.22s cubic-bezier(0.34,1.5,0.64,1) both;
  }

  @keyframes pop-in {
    from { opacity:0; transform: translateY(6px) scale(0.96); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  .bubble-row.me { flex-direction: row-reverse; }

  .mini-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    margin-bottom: 2px;
  }

  .bubble-wrap { display: flex; flex-direction: column; max-width: 74%; }
  .bubble-row.me .bubble-wrap { align-items: flex-end; }

  .bubble {
    padding: 9px 13px;
    border-radius: var(--radius);
    line-height: 1.55;
    font-size: 14.5px;
    font-weight: 400;
    word-break: break-word;
  }

  .bubble-row.her .bubble {
    background: var(--bubble-her);
    border-bottom-left-radius: 4px;
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.05);
  }

  .bubble-row.me .bubble {
    background: var(--bubble-me);
    border-bottom-right-radius: 4px;
    color: #f0e8ff;
    border: 1px solid rgba(176,111,216,0.15);
  }

  .bubble-time {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
    padding: 0 2px;
    opacity: 0.65;
  }

  /* TYPING */
  .typing-row { display: none; align-items: flex-end; gap: 7px; }
  .typing-row.visible { display: flex; }

  .typing-bubble {
    background: var(--bubble-her);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    padding: 11px 14px;
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .dot {
    width: 6px;
    height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.3s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity:0.3; }
    30%          { transform: translateY(-5px); opacity:0.85; }
  }

  /* WELCOME */
  .welcome {
    text-align: center;
    padding: 28px 20px 20px;
  }

  .welcome-name {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 28px;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }

  .welcome-sub {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
  }

  .welcome-line {
    width: 32px;
    height: 1px;
    background: var(--accent);
    margin: 10px auto;
    opacity: 0.5;
  }

  /* INPUT */
  .input-area {
    padding: 10px 14px 12px;
    background: var(--bg2);
    border-top: 1px solid var(--line);
    display: flex;
    gap: 9px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--bg3);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: flex-end;
    padding: 8px 14px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: rgba(232,100,138,0.3);
  }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    resize: none;
    max-height: 90px;
    line-height: 1.5;
  }

  #msg-input::placeholder { color: var(--text-dim); font-size: 14px; }

  .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.12s, opacity 0.12s;
    opacity: 0.9;
  }

  .send-btn:active { transform: scale(0.88); opacity: 1; }
  .send-btn svg { width: 17px; height: 17px; fill: white; margin-left: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="avatar">
    🌸
    <div class="online-dot"></div>
  </div>
  <div class="header-info">
    <div class="header-name">Mishty</div>
    <div class="header-status" id="status-text">online</div>
  </div>
</div>

<!-- MESSAGES -->
<div class="messages" id="messages">
  <div class="welcome">
    <div class="welcome-name">Mishty</div>
    <div class="welcome-line"></div>
    <div class="welcome-sub">Aagaye aakhir tum...<br/>bolo kya chal raha hai aaj?</div>
  </div>

  <!-- Typing indicator -->
  <div class="typing-row" id="typing-row">
    <div class="mini-avatar">🌸</div>
    <div class="typing-bubble">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="msg-input" placeholder="Kuch bolo..." rows="1"></textarea>
  </div>
  <button class="send-btn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#141416');
  tg.setBackgroundColor('#0d0d0f');
}

const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('msg-input');
const typingRow  = document.getElementById('typing-row');
const statusEl   = document.getElementById('status-text');

const BACKEND_URL = "https://chat-bot-d7mu.onrender.com";

const userId   = tg?.initDataUnsafe?.user?.id || "webapp_user";
let isWaiting  = false;

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 90) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function scrollBottom() {
  setTimeout(() => messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' }), 40);
}

function getTime() {
  return new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });
}

function addBubble(text, sender) {
  typingRow.remove();
  const row = document.createElement('div');
  row.className = `bubble-row ${sender}`;

  if (sender === 'her') {
    row.innerHTML = `
      <div class="mini-avatar">🌸</div>
      <div class="bubble-wrap">
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="bubble-time">${getTime()}</div>
      </div>`;
  } else {
    row.innerHTML = `
      <div class="bubble-wrap">
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="bubble-time">${getTime()}</div>
      </div>`;
  }

  messagesEl.appendChild(row);
  messagesEl.appendChild(typingRow);
  scrollBottom();
}

function showTyping(show) {
  typingRow.classList.toggle('visible', show);
  if (show) scrollBottom();
}

function setStatus(text) {
  statusEl.textContent = text;
}

function escapeHtml(text) {
  return text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br/>');
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isWaiting) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';

  addBubble(text, 'me');

  isWaiting = true;
  showTyping(true);
  setStatus('typing...');

  try {
    const res = await fetch(`${BACKEND_URL}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, message: text })
    });

    if (!res.ok) throw new Error(`${res.status}`);

    const data = await res.json();

    showTyping(false);

    // API fail ya None reply — koi message nahi dikhana
    if (!data.reply) {
      setStatus('online');
      isWaiting = false;
      inputEl.focus();
      return;
    }

    addBubble(data.reply, 'her');
    setStatus('online');

  } catch (err) {
    console.error(err);
    showTyping(false);
    setStatus('online');
    // Koi error message nahi dikhate — silent fail
  }

  isWaiting = false;
  inputEl.focus();
}

setTimeout(() => inputEl.focus(), 400);
</script>
</body>
</html>
